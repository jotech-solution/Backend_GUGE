{% extends 'base.html' %}
{% load static %}

{% block title %}Modifier - Campagne {{ campaign.name }}{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-block">
        <div class="row align-items-center">
            <div class="col-md-12">
                <div class="page-header-title">
                    <h5 class="m-b-10">Modifier la Campagne</h5>
                </div>
                <ul class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'home' %}">Accueil</a></li>
                    <li class="breadcrumb-item"><a href="{% url 'campaign_list' %}">Campagnes</a></li>
                    <li class="breadcrumb-item">Modifier</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5>Formulaire de modification</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group mb-3">
                        <label class="form-label">Nom de la Campagne</label>
                        <input type="text" name="name" class="form-control" value="{{ campaign.name }}" required>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Date de début</label>
                        <input type="datetime-local" name="start_date" class="form-control" value="{{ campaign.start_date|date:'Y-m-dTH:i' }}" required>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Date de fin</label>
                        <input type="datetime-local" name="end_date" class="form-control" value="{{ campaign.end_date|date:'Y-m-dTH:i' }}" required>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Questionnaire</label>
                        <select name="question_template" class="form-select">
                            <option value="">Aucun</option>
                            {% for template in templates %}
                            <option value="{{ template.id }}" {% if campaign.question_templates and campaign.question_templates.id == template.id %}selected{% endif %}>
                                {{ template.name }} ({{ template.get_type_display }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label">Commentaires</label>
                        <textarea name="comments" class="form-control" rows="3">{{ campaign.comments }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Mettre à jour</button>
                        <a href="{% url 'campaign_list' %}" class="btn btn-light">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
